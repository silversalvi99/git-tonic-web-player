server {
    listen 80;
    server_name localhost;

    # Root-level assets (needed because index.html uses absolute paths like /assets/...)
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        access_log off;
    }

    # Explicit MIME type for webmanifest at root level
    location ~ ^/assets/.*\.webmanifest$ {
        alias /usr/share/nginx/html/assets/site.webmanifest;
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location /player/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /player/index.html;
    }

    location /player/assets/ {
        alias /usr/share/nginx/html/assets/;
        access_log off;
    }

    # Explicit rule for webmanifest with correct MIME type under /player/
    location ~ ^/player/assets/.*\.webmanifest$ {
        alias /usr/share/nginx/html/assets/site.webmanifest;
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location ~ ^/player/(.+\.(js|css|ico|svg|map|png|webp|woff2?|ttf))$ {
        alias /usr/share/nginx/html/$1;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = / {
        return 301 /player/;
    }
}