name: Gin Player Deploy CI/CD

on:
  push:
    branches: [master]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  quality-gate:
    runs-on: self-hosted
    env:
      CI: 'true'
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
      options: --network gin-network

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular App
        run: npm run build

      - name: Inject Secret Config into Build Result
        env:
          PRIVATE_CONFIG: ${{ secrets.NAVIDROME_CONFIG_JSON }}
        run: |
          # Trova la cartella di output (es. dist/project-name/browser)
          TARGET_DIR=$(find dist -name "index.html" -exec dirname {} \;)
          echo "Found target dir: $TARGET_DIR"

          mkdir -p "$TARGET_DIR/assets"
          echo "$PRIVATE_CONFIG" > "$TARGET_DIR/assets/config.json"

          if [ -f "$TARGET_DIR/assets/config.json" ]; then
            echo "✅ config.json loaded in $TARGET_DIR/assets/"
          else
            echo "❌ Error: Impossible to create config.json"
            exit 1
          fi

      - name: Run E2E Tests
        run: npx playwright test --max-failures=1

  release:
    needs: quality-gate
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ needs.release.outputs.new_release_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [release, build-and-push]
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/opc/
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin           
            docker compose pull gin-tonic-player
            docker compose up -d gin-tonic-player           
            docker image prune -f
