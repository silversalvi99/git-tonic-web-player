<div
  class="relative flex flex-row items-center justify-between bg-zinc-950 border-t border-zinc-900 px-4 py-2 md:py-3 h-20 md:h-24 transition-all group/container"
>
  <!-- Expand Handle -->
  <div
    (click)="toggleOpenMode.emit()"
    class="absolute -top-3 left-1/2 -translate-x-1/2 w-10 h-1.5 bg-zinc-800/80 rounded-full cursor-pointer hover:bg-zinc-600 transition-all z-60 hover:scale-x-110"
    aria-label="Expand player"
    data-testid="mini-player-expand"
  ></div>

  <div class="absolute -top-1.5 left-0 right-0 h-4 group/seeker z-50 flex items-center">
    <div class="relative w-full h-1 bg-zinc-800 overflow-hidden">
      <div
        class="h-full bg-white group-hover/seeker:bg-[#251db9] transition-colors"
        [style.width.%]="(displayTime() / (webPlayer.duration() || 1)) * 100"
      ></div>
    </div>

    <input
      type="range"
      [min]="0"
      [max]="webPlayer.duration() || 0"
      [value]="displayTime()"
      (input)="onSeekInput($event)"
      (change)="onSeekChange($event)"
      class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-30"
      aria-label="Seek track"
      data-testid="player-seek"
    />

    <div
      class="absolute w-3 h-3 bg-white rounded-full shadow-lg scale-0 group-hover/seeker:scale-100 transition-transform pointer-events-none z-40"
      [style.left.%]="(displayTime() / (webPlayer.duration() || 1)) * 100"
      style="transform: translateX(-50%)"
    ></div>
  </div>

  <div
    class="flex items-center gap-3 md:gap-4 w-auto grow md:w-1/3 min-w-0 group/track relative h-full cursor-pointer pr-4"
    (click)="toggleOpenMode.emit()"
    data-testid="mini-player-track-info"
  >
    @if (webPlayer.currentTrack(); as track) {
      <div class="relative group/artwork">
        <img
          [src]="track.coverThumb"
          class="w-12 h-12 md:w-14 md:h-14 rounded shadow-lg object-cover transition-transform group-hover/artwork:scale-105"
          [alt]="track.title"
        />
        <div
          class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover/artwork:opacity-100 transition-opacity rounded"
        >
          <ng-icon name="heroArrowsPointingOut" class="text-white text-xl"></ng-icon>
        </div>
      </div>
      <div class="flex flex-col min-w-0">
        <div class="flex items-center gap-2">
          <span
            class="text-white text-sm font-semibold truncate group-hover/track:text-indigo-400 transition-colors"
          >
            {{ track.title }}
          </span>
          <ng-icon
            name="heroChevronUp"
            class="text-zinc-500 opacity-0 group-hover/track:opacity-100 transition-all"
          ></ng-icon>
        </div>
        <span
          class="text-zinc-400 text-xs truncate hover:text-white transition-colors cursor-pointer"
        >
          {{ track.artist }}
        </span>
      </div>
    }
  </div>

  <div class="flex flex-col items-center gap-2 w-auto md:w-1/3">
    <div class="flex items-center gap-6">
      <button
        (click)="webPlayer.previousTrack()"
        class="text-zinc-400 hover:text-white transition-all active:scale-90 flex"
        aria-label="Previous track"
        data-testid="player-prev"
      >
        <ng-icon name="heroBackward" class="text-xl"></ng-icon>
      </button>

      <button
        (click)="webPlayer.togglePlay()"
        class="w-10 h-10 flex items-center justify-center rounded-full bg-white text-black hover:scale-105 active:scale-95 transition-all shadow-md"
        [aria-label]="webPlayer.isPlaying() ? 'Pause' : 'Play'"
        data-testid="player-play-pause"
      >
        <ng-icon
          [name]="webPlayer.isPlaying() ? 'heroPause' : 'heroPlay'"
          class="text-xl md:text-2xl"
        ></ng-icon>
      </button>

      <button
        (click)="webPlayer.nextTrack()"
        class="text-zinc-400 hover:text-white transition-all active:scale-90 flex"
        aria-label="Next track"
        data-testid="player-next"
      >
        <ng-icon name="heroForward" class="text-xl"></ng-icon>
      </button>
    </div>

    <div
      class="hidden md:flex items-center gap-3 w-full max-w-xs text-[10px] font-mono text-zinc-500"
    >
      <span class="w-10 text-right">{{ webPlayer.currentTime() | formatDuration }}</span>
      <div class="grow h-px bg-zinc-800"></div>
      <span class="w-10">{{ webPlayer.duration() | formatDuration }}</span>
    </div>
  </div>
  <!-- Right Section: Volume & Expand -->
  <div class="flex w-auto md:w-1/3 justify-end items-center gap-1 md:gap-3 group/vol-container">
    <div class="hidden md:flex items-center gap-3">
      <button
        (click)="toggleMute()"
        class="text-zinc-400 hover:text-white transition-colors flex self-center"
        aria-label="Mute/Unmute"
        data-testid="player-mute"
      >
        <ng-icon
          [name]="webPlayer.volume() === 0 ? 'heroSpeakerXMark' : 'heroSpeakerWave'"
          class="text-lg"
        ></ng-icon>
      </button>
      <div class="relative w-24 h-4 group/volume flex items-center">
        <div class="relative w-full h-1 bg-zinc-800 rounded-full overflow-hidden">
          <div
            class="h-full bg-zinc-400 group-hover/vol-container:bg-[#1db954] transition-colors rounded-full"
            [style.width.%]="webPlayer.volume() * 100"
          ></div>
        </div>

        <input
          type="range"
          min="0"
          max="1"
          step="0.01"
          [value]="webPlayer.volume()"
          (input)="onVolumeChange($event)"
          class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-30"
          aria-label="Volume"
          data-testid="player-volume"
        />

        <div
          class="absolute w-3 h-3 bg-white rounded-full shadow-lg scale-0 group-hover/volume:scale-100 transition-transform pointer-events-none z-40"
          [style.left.%]="webPlayer.volume() * 100"
          style="transform: translateX(-50%)"
        ></div>
      </div>
    </div>
  </div>
</div>
