<div
  class="relative flex flex-col md:flex-row items-center justify-between bg-zinc-900/95 backdrop-blur-xl border-t border-zinc-800/50 px-4 py-3 md:py-0 md:h-24 transition-all duration-500"
>
  <!-- Progress Bar (Improved Hit Area & Spacing) -->
  <div class="absolute -top-3 left-0 right-0 h-6 group/seeker z-50">
    <div class="relative w-full h-full flex items-center px-0 md:px-4">
      <input
        type="range"
        [min]="0"
        [max]="webPlayer.duration() || 0"
        [value]="webPlayer.currentTime()"
        (input)="onSeek($event)"
        class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-30"
        aria-label="Seek"
      />
      <div class="w-full h-1 md:h-1.5 bg-zinc-800 rounded-full relative">
        <div
          class="h-full bg-indigo-500 group-hover/seeker:bg-indigo-400 transition-colors relative rounded-full"
          [style.width.%]="(webPlayer.currentTime() / (webPlayer.duration() || 1)) * 100"
        >
          <!-- Handle visual representation -->
          <div
            class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-3 h-3 bg-white rounded-full shadow-[0_0_10px_rgba(99,102,241,0.5)] scale-0 group-hover/seeker:scale-100 transition-transform duration-200"
          ></div>
        </div>
      </div>
    </div>
  </div>
  <!-- Left: Track Info -->
  <div class="flex items-center gap-4 w-full md:w-1/3 min-w-0 mt-2 md:mt-0">
    @if (webPlayer.currentTrack(); as track) {
      <div
        class="w-12 h-12 md:w-16 md:h-16 bg-zinc-800 rounded-lg shrink-0 overflow-hidden shadow-2xl ring-1 ring-white/10"
      >
        <img [src]="track.coverUrl" [alt]="track.title" class="w-full h-full object-cover" />
      </div>
      <div class="flex flex-col min-w-0">
        <span
          class="text-white text-base md:text-lg font-bold tracking-tight truncate drop-shadow-sm"
        >
          {{ track.title }}
        </span>
        <span
          class="text-zinc-400 text-xs md:text-sm font-medium truncate uppercase tracking-widest opacity-80"
        >
          {{ track.artist }}
        </span>
      </div>
    } @else {
      <div class="w-12 h-12 md:w-16 md:h-16 bg-zinc-800/50 rounded-lg shrink-0 animate-pulse"></div>
      <div class="flex flex-col gap-2 grow">
        <div class="h-5 w-3/4 bg-zinc-800/50 rounded animate-pulse"></div>
        <div class="h-3 w-1/2 bg-zinc-800/30 rounded animate-pulse"></div>
      </div>
    }
  </div>

  <!-- Center: Controls -->
  <div class="flex flex-col items-center gap-1 w-full md:w-1/3 mt-4 order-first md:order-0">
    <div class="flex items-center gap-4 md:gap-8">
      <button
        (click)="webPlayer.previousTrack()"
        class="text-zinc-400 hover:text-white hover:scale-110 active:scale-95 transition-all p-2"
        aria-label="Previous track"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"></path>
        </svg>
      </button>

      <button
        (click)="webPlayer.togglePlay()"
        class="w-12 h-12 md:w-14 md:h-14 flex items-center justify-center rounded-full bg-white text-black hover:scale-110 active:scale-90 transition-all shadow-xl shadow-indigo-500/20"
        [aria-label]="webPlayer.isPlaying() ? 'Pause' : 'Play'"
      >
        @if (webPlayer.isPlaying()) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="currentColor"
          >
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>
          </svg>
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="currentColor"
          >
            <path d="M8 5v14l11-7z"></path>
          </svg>
        }
      </button>

      <button
        (click)="webPlayer.nextTrack()"
        class="text-zinc-400 hover:text-white hover:scale-110 active:scale-95 transition-all p-2"
        aria-label="Next track"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"></path>
        </svg>
      </button>
    </div>

    <!-- Time on desktop, hidden on mobile to save space if needed, or integrated -->
    <div
      class="hidden md:flex items-center gap-3 w-full max-w-xs text-[10px] font-mono text-zinc-500"
    >
      <span class="w-10 text-right">{{ webPlayer.currentTime() | formatDuration }}</span>
      <div class="grow h-px bg-zinc-800"></div>
      <span class="w-10">{{ webPlayer.duration() | formatDuration }}</span>
    </div>
  </div>

  <!-- Right: Volume & Extras (Desktop only for now) -->
  <div class="hidden md:flex w-1/3 justify-end items-center gap-4 group/volume">
    <button
      (click)="toggleMute()"
      class="text-zinc-400 hover:text-white transition-colors p-2"
      aria-label="Mute/Unmute"
    >
      @if (webPlayer.volume() === 0) {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M11 5 6 9H2v6h4l5 4V5z"></path>
          <line x1="23" y1="9" x2="17" y2="15"></line>
          <line x1="17" y1="9" x2="23" y2="15"></line>
        </svg>
      } @else if (webPlayer.volume() < 0.5) {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
      } @else {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
      }
    </button>
    <div class="relative w-24 h-6 flex items-center group/slider">
      <input
        type="range"
        [min]="0"
        [max]="1"
        [step]="0.01"
        [value]="webPlayer.volume()"
        (input)="onVolumeChange($event)"
        class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-30"
        aria-label="Volume"
      />
      <div class="w-full h-1 bg-zinc-800 rounded-full relative">
        <div
          class="h-full bg-zinc-400 group-hover/volume:bg-indigo-500 transition-colors rounded-full"
          [style.width.%]="webPlayer.volume() * 100"
        ></div>
      </div>
      <!-- Thumb visual hint -->
      <div
        class="absolute top-1/2 -translate-y-1/2 -translate-x-1/2 w-3 h-3 bg-white rounded-full shadow-lg scale-0 group-hover/slider:scale-100 transition-transform z-40 pointer-events-none"
        [style.left.%]="webPlayer.volume() * 100"
      ></div>
    </div>
  </div>
</div>
