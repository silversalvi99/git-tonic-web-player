@if (!webPlayer.isOpenMode()) {
  <app-mini-player (toggleOpenMode)="toggleOpenMode()"></app-mini-player>
} @else {
  <app-expanded-player
    *ngIf="webPlayer.isOpenMode()"
    [currentColors]="currentColors()"
    [isClosing]="isClosing()"
    (toggleClose)="toggleOpenMode()"
  ></app-expanded-player>
}
