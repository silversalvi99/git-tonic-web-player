<nav class="flex flex-col h-full w-full py-12 px-8 space-y-12">
  <div class="flex flex-col space-y-6">
    <ul class="space-y-2">
      @for (item of menuItems(); track item.route) {
        <li>
          <a
            [routerLink]="item.route"
            routerLinkActive="text-white font-medium border-l-2 border-indigo-500"
            class="group flex items-center py-2 px-3 text-xl font-light text-zinc-500 hover:text-zinc-200 transition-all duration-300"
          >
            <ng-icon
              [name]="item.icon"
              class="text-2xl mr-4 transition-transform group-hover:scale-110"
            >
            </ng-icon>

            <span class="tracking-tight">
              {{ item.label }}
            </span>
          </a>
        </li>
      }
    </ul>
  </div>
</nav>
