<div class="flex flex-row items-center gap-3 w-full max-w-4xl mb-5">
  <div class="relative flex-1">
    <input
      type="text"
      [placeholder]="'search.placeholder' | translate"
      class="w-full bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-lg px-4 py-2 pr-10 text-zinc-950 dark:text-white transform-border duration-200 ease-out focus:border-indigo-500 focus:outline-none placeholder:text-zinc-500 dark:placeholder:text-zinc-600"
      [formField]="searchForm.search"
    />

    @if (searchForm.search().value()) {
      <button
        type="button"
        (click)="searchForm.search().value.set('')"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-950 dark:hover:text-white transition-colors duration-200"
        [attr.aria-label]="'search.clearLabel' | translate"
      >
        <ng-icon name="heroXMark" class="w-5 h-5"></ng-icon>
      </button>
    }
  </div>

  <button
    type="button"
    (click)="refresh()"
    class="shrink-0 h-[42px] px-6 inline-flex items-center justify-center gap-2 text-sm font-medium text-zinc-600 dark:text-zinc-300 bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg hover:bg-zinc-200 dark:hover:bg-zinc-700 hover:text-zinc-950 dark:hover:text-white active:scale-95 transition-all duration-200 shadow-sm"
  >
    <ng-icon name="heroArrowPath" class="h-4 w-4"></ng-icon>
    <span class="hidden md:inline">{{ 'search.discoverBtn' | translate }}</span>
  </button>
</div>
