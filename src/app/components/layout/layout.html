<div
  class="h-screen flex flex-col md:flex-row bg-white dark:bg-black text-zinc-950 dark:text-white overflow-hidden font-sans transition-colors duration-500"
>
  <aside
    class="hidden md:flex flex-col w-64 flex-none bg-zinc-100 dark:bg-zinc-950 border-r border-zinc-200 dark:border-zinc-900 transition-colors duration-500"
  >
    <app-sidebar></app-sidebar>
  </aside>

  <div class="grow flex flex-col relative overflow-hidden">
    <main class="grow overflow-y-auto p-6 md:p-10 pb-64 md:pb-32">
      <router-outlet></router-outlet>
    </main>

    <div class="fixed bottom-0 left-0 right-0 z-50 flex flex-col">
      @if (isPlayerVisible()) {
        <app-player class="w-full"></app-player>
      }
      <div class="block md:hidden w-full">
        <app-tabs></app-tabs>
      </div>
    </div>
  </div>
</div>
