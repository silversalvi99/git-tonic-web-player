<section
  class="bg-zinc-100 dark:bg-zinc-900/50 rounded-2xl p-6 border border-zinc-200 dark:border-white/5 transition-colors"
>
  <div class="flex items-center gap-3 mb-6">
    <ng-icon name="heroLanguage" class="text-2xl text-indigo-500"></ng-icon>
    <h2 class="text-xl font-medium text-zinc-950 dark:text-white">
      {{ 'languageSectionTitle' | translate }}
    </h2>
  </div>

  <div class="flex flex-col gap-4">
    <label for="language-select" class="text-sm text-zinc-600 dark:text-zinc-400">
      {{ 'selectLanguageLabel' | translate }}
    </label>
    <div class="relative">
      <select
        id="language-select"
        data-testid="language-select"
        (change)="onLanguageBlur($event)"
        (blur)="updateLanguage($event)"
        class="w-full bg-white dark:bg-zinc-800 text-zinc-950 dark:text-white px-4 py-3 rounded-xl border border-zinc-200 dark:border-white/10 appearance-none focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer"
      >
        @for (lang of languages(); track lang.value) {
          <option [value]="lang.value" [selected]="currentSettings().language === lang.value">
            {{ lang.label }}
          </option>
        }
      </select>
      <div
        class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-zinc-500 dark:text-zinc-400"
      >
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M19 9l-7 7-7-7"
          />
        </svg>
      </div>
    </div>

    <p class="mt-2 text-sm text-zinc-500 italic">
      {{ 'languageChangeNote' | translate }}
    </p>
  </div>
</section>
