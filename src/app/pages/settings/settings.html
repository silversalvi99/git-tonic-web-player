<div class="h-screen flex flex-col md:flex-row bg-black text-white overflow-hidden font-sans">
  <aside class="hidden md:flex flex-col max-w-48 flex-none bg-zinc-950 border-r border-zinc-900">
    <app-sidebar></app-sidebar>
  </aside>

  <div class="grow flex flex-col relative overflow-hidden">
    <main class="grow overflow-y-auto p-6 md:p-10 pb-64 md:pb-32">
      <section>
        <h1 class="text-4xl font-extrabold tracking-tighter mb-8">
          {{ 'settingsTitle' | translate }}
        </h1>

        <div class="space-y-8">
          <!-- Language Section -->
          <section class="bg-zinc-900/50 rounded-2xl p-6 border border-white/5 max-w-2xl">
            <div class="flex items-center gap-3 mb-6">
              <ng-icon name="heroLanguage" class="text-2xl text-indigo-500"></ng-icon>
              <h2 class="text-xl font-medium text-white">
                {{ 'languageSectionTitle' | translate }}
              </h2>
            </div>

            <div class="flex flex-col gap-4">
              <label for="language-select" class="text-sm text-zinc-400">{{
                'selectLanguageLabel' | translate
              }}</label>
              <div class="relative">
                <select
                  id="language-select"
                  (change)="onLanguageChange($event)"
                  class="w-full bg-zinc-800 text-white px-4 py-3 rounded-xl border border-white/10 appearance-none focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer"
                >
                  @for (lang of languages; track lang.value) {
                    <option
                      [value]="lang.value"
                      [selected]="currentSettings().language === lang.value"
                    >
                      {{ lang.label }}
                    </option>
                  }
                </select>
                <div
                  class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-zinc-400"
                >
                  <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 9l-7 7-7-7"
                    />
                  </svg>
                </div>
              </div>

              <p class="mt-2 text-sm text-zinc-500 italic">
                {{ 'languageChangeNote' | translate }}
              </p>
            </div>
          </section>

          <!-- More sections can be added here -->
        </div>
      </section>
    </main>

    <div class="fixed bottom-0 left-0 right-0 z-50 flex flex-col">
      @if (isPlayerVisible()) {
        <app-player class="w-full"></app-player>
      }
      <div class="block md:hidden w-full">
        <app-tabs></app-tabs>
      </div>
    </div>
  </div>
</div>
